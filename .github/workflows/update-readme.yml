name: Update README with Repos

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # <— important fix
    steps:
      - uses: actions/checkout@v3

      - name: Update README with repositories
        uses: sansk/github-repo-display@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: KurchetiGurubhaskar
          readme_path: README.md
          start_marker: <!--START_SECTION:repos-->
          end_marker: <!--END_SECTION:repos-->
          max_repos: 10
          show_description: true
          show_language: true
          show_stars: true
          show_forks: true
          commit_message: "Update README with latest repositories"
          commit_changes: true

